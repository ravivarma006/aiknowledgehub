<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Nexus · AI Knowledge Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app/styles.css">
</head>
<body>

<!-- Desktop backdrop + phone framing -->
<div id="deskBg" aria-hidden="true">
  <div class="dbg-grid"></div>
  <div class="dbg-glow dbg-glow-a"></div>
  <div class="dbg-glow dbg-glow-b"></div>
  <div class="dbg-glow dbg-glow-c"></div>
  <div class="dbg-noise"></div>
</div>

<div id="deskSide" aria-hidden="true">
  <div class="ds-logo">
    <svg viewBox="0 0 32 32" width="28" height="28"><defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b68cff"/><stop offset=".5" stop-color="#5ac8ff"/><stop offset="1" stop-color="#3bd7c0"/></linearGradient></defs><path d="M16 2 L28 9 V23 L16 30 L4 23 V9 Z" fill="none" stroke="url(#lg1)" stroke-width="1.4"/><path d="M10 12 L16 20 L22 12" fill="none" stroke="url(#lg1)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="16" cy="10" r="1.5" fill="url(#lg1)"/></svg>
    <div><div class="ds-name">NEXUS</div><div class="ds-sub">AI Knowledge Hub</div></div>
  </div>
  <div class="ds-meta">
    <div class="ds-row"><span>Version</span><b>v4.26 · mobile</b></div>
    <div class="ds-row"><span>Resources</span><b>120</b></div>
    <div class="ds-row"><span>Categories</span><b>10</b></div>
    <div class="ds-row"><span>Updated</span><b>May 21, 2026</b></div>
  </div>
  <div class="ds-tip">
    <div class="ds-tip-title">Tap & swipe</div>
    <div class="ds-tip-body">Bottom nav switches pages · swipe category rails sideways · pull a tool card to open detail · tap the orb for AI.</div>
  </div>
  <div class="ds-legend">
    <span class="dot" style="background:#b68cff"></span> AI
    <span class="dot" style="background:#4285f4"></span> Google
    <span class="dot" style="background:#5ac8ff"></span> Data
    <span class="dot" style="background:#3bd7c0"></span> Infra
    <span class="dot" style="background:#ff7ac3"></span> FE
    <span class="dot" style="background:#00e5a0"></span> Skills
  </div>
</div>

<!-- Phone device -->
<main id="device">
  <div class="device-bezel">
    <div class="notch"><span class="cam"></span></div>
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg width="16" height="10" viewBox="0 0 16 10"><path d="M1 9h2V6H1zM5 9h2V4H5zM9 9h2V2H9zM13 9h2V0h-2z" fill="currentColor"/></svg>
        <svg width="14" height="10" viewBox="0 0 14 10"><path d="M7 2c2 0 4 .8 5.5 2l-1 1.2C10.3 4.1 8.7 3.5 7 3.5S3.7 4.1 2.5 5.2L1.5 4C3 2.8 5 2 7 2z M7 5c1.3 0 2.5.5 3.4 1.3L9.3 7.6C8.7 7 7.9 6.7 7 6.7S5.3 7 4.7 7.6L3.6 6.3C4.5 5.5 5.7 5 7 5z" fill="currentColor"/><circle cx="7" cy="9" r="1" fill="currentColor"/></svg>
        <svg width="24" height="10" viewBox="0 0 24 10"><rect x="0.5" y="0.5" width="20" height="9" rx="2" fill="none" stroke="currentColor"/><rect x="2" y="2" width="16" height="6" rx="1" fill="currentColor"/><rect x="21" y="3" width="1.5" height="4" rx=".5" fill="currentColor"/></svg>
      </span>
    </div>

    <!-- React mount -->
    <div id="app"></div>

    <div class="homebar"></div>
  </div>
</main>

<!-- Libraries -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script src="app/icons.js"></script>
<script type="text/babel" src="app/glyphs.jsx"></script>
<script type="text/babel" src="app/atoms.jsx"></script>
<script type="text/babel" src="app/pages.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

</body>
</html>
